name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# packages: write needed for ghcr.io push by the reusable workflow's
# docker-publish job.
permissions:
  contents: write
  packages: write

jobs:
  release:
    uses: homeCore-io/hc-scripts/.github/workflows/rust-release.yml@main
    with:
      binary_name: hc-hue
      config_example: config/config.toml.example
      rust_version: "stable"
      publish_docker_image: true
      # While homeCore-io/docker is still on develop. Switch to 'main'
      # (or remove this line) once that repo's main branch carries the
      # docker assets.
      docker_repo_ref: develop
